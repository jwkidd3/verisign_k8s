# Student ClusterRole - allows creating/managing namespaces and resources within them
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: student-lab-role
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "watch", "delete"]
  # Full access to namespaced resources
  - apiGroups: ["", "apps", "batch", "autoscaling", "policy", "networking.k8s.io", "rbac.authorization.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  # Helm and Flux resources (read-only for cluster-scoped)
  - apiGroups: ["helm.toolkit.fluxcd.io", "kustomize.toolkit.fluxcd.io", "source.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["*"]
  # Gateway API
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  # Monitoring CRDs
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["*"]
    verbs: ["*"]
  # External Secrets
  - apiGroups: ["external-secrets.io"]
    resources: ["*"]
    verbs: ["*"]
  # Read-only cluster info
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: student-lab-binding
subjects:
  - kind: Group
    name: students
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: student-lab-role
  apiGroup: rbac.authorization.k8s.io
