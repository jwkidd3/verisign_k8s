# ─── Splunk Standalone (Free License) ───────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: splunk
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: splunk
  namespace: splunk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: splunk
  template:
    metadata:
      labels:
        app: splunk
    spec:
      containers:
        - name: splunk
          image: splunk/splunk:9.2
          env:
            - name: SPLUNK_START_ARGS
              value: "--accept-license"
            - name: SPLUNK_PASSWORD
              value: "Chang3Me!"
            - name: SPLUNK_LICENSE_URI
              value: Free
          ports:
            - containerPort: 8000
              name: web
            - containerPort: 8088
              name: hec
            - containerPort: 8089
              name: mgmt
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: splunk
  namespace: splunk
spec:
  selector:
    app: splunk
  ports:
    - name: web
      port: 8000
    - name: hec
      port: 8088
    - name: mgmt
      port: 8089
---
# ─── ClusterIssuer (Let's Encrypt) ─────────────────────────────────────────
# REQUIRES DNS: Uncomment after setting enable_dns = true in Terraform
