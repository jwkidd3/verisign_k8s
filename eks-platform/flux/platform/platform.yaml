#             region: us-east-2
---
# ─── Platform Gateway (HTTP only — add TLS listener when DNS is configured) ─
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: platform-gateway
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    # REQUIRES DNS: Uncomment for TLS
    # - name: https
    #   protocol: HTTPS
    #   port: 443
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - name: platform-tls
    #   hostname: "*.example.com"
---
# ─── Logging Pipeline → Splunk ─────────────────────────────────────────────
apiVersion: logging.banzaicloud.io/v1beta1
kind: Logging
metadata:
  name: default-logging
  namespace: logging
spec:
  fluentd: {}
  fluentbit: {}
  controlNamespace: logging
---
apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterOutput
metadata:
  name: splunk-output
  namespace: logging
spec:
  splunkHec:
    hec_host: splunk.splunk.svc.cluster.local
    hec_port: 8088
    hec_token:
      valueFrom:
        secretKeyRef:
          name: splunk-hec-token
          key: token
    insecure_ssl: true
    index: main
    source: kubernetes
    format:
      type: json
---
apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterFlow
metadata:
  name: all-logs-to-splunk
  namespace: logging
spec:
  globalOutputRefs:
    - splunk-output
---
# ─── Blackbox Probes ───────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: external-endpoints
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  interval: 30s
  module: http_2xx
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc:9115
  targets:
    staticConfig:
      static:
        - http://vault.vault.svc.cluster.local:8200/v1/sys/health
        - http://splunk.splunk.svc.cluster.local:8000
        # Add external endpoints when DNS is configured
        # - https://example.com
