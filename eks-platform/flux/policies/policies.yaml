# ─── Require Resource Limits ────────────────────────────────────────────────
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
spec:
  validationFailureAction: Audit
  rules:
    - name: check-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "CPU and memory limits are required."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
---
# ─── Require Labels ────────────────────────────────────────────────────────
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-team-label
spec:
  validationFailureAction: Audit
  rules:
    - name: check-team-label
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
      validate:
        message: "The label 'team' is required on all Deployments and StatefulSets."
        pattern:
          metadata:
            labels:
              team: "?*"
---
# ─── Disallow Privileged Containers ────────────────────────────────────────
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged
spec:
  validationFailureAction: Enforce
  rules:
    - name: deny-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - calico-system
                - logging
      validate:
        message: "Privileged containers are not allowed."
        pattern:
          spec:
            containers:
              - securityContext:
                  privileged: "!true"
---
# ─── Require Non-Root ──────────────────────────────────────────────────────
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-non-root
spec:
  validationFailureAction: Audit
  rules:
    - name: check-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - calico-system
                - logging
                - vault
      validate:
        message: "Containers must run as non-root."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
---
# ─── Auto-generate ResourceQuota for Lab Namespaces ─────────────────────────
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: generate-resource-quota
  annotations:
    policies.kyverno.io/title: Auto-generate ResourceQuota for lab namespaces
    policies.kyverno.io/description: Creates ResourceQuota and LimitRange when a lab namespace is created
spec:
  rules:
    - name: generate-quota
      match:
        any:
          - resources:
              kinds: ["Namespace"]
              names: ["lab*", "obs-*", "probes-*", "deploy-*", "helm-*", "cicd-*", "flux-*", "irsa-*", "monitoring-*"]
      generate:
        apiVersion: v1
        kind: ResourceQuota
        name: student-quota
        namespace: "{{request.object.metadata.name}}"
        data:
          spec:
            hard:
              requests.cpu: "4"
              requests.memory: 8Gi
              limits.cpu: "8"
              limits.memory: 16Gi
              pods: "40"
              services: "10"
              persistentvolumeclaims: "10"
    - name: generate-limitrange
      match:
        any:
          - resources:
              kinds: ["Namespace"]
              names: ["lab*", "obs-*", "probes-*", "deploy-*", "helm-*", "cicd-*", "flux-*", "irsa-*", "monitoring-*"]
      generate:
        apiVersion: v1
        kind: LimitRange
        name: student-limits
        namespace: "{{request.object.metadata.name}}"
        data:
          spec:
            limits:
              - type: Container
                default:
                  cpu: 500m
                  memory: 512Mi
                defaultRequest:
                  cpu: 50m
                  memory: 64Mi
              - type: Pod
                max:
                  cpu: "4"
                  memory: 4Gi
