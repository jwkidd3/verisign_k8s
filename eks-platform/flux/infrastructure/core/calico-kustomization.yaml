# ─── Calico Operator ────────────────────────────────────────────────────────
# Calico uses raw manifests, not Helm — Flux applies them directly
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: calico-operator
  namespace: flux-system
spec:
  interval: 30m
  prune: false  # don't delete Calico CRDs on removal
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./flux/infrastructure/core/calico
