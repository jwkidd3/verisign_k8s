# ─── Logging Operator ──────────────────────────────────────────────────────
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: logging-operator
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: logging
  install:
    createNamespace: true
  chart:
    spec:
      chart: logging-operator
      sourceRef:
        kind: HelmRepository
        name: kube-logging
      version: ">=4.8.0"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: logging-operator-logging
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: logging
  dependsOn:
    - name: logging-operator
  chart:
    spec:
      chart: logging-operator-logging
      sourceRef:
        kind: HelmRepository
        name: kube-logging
      version: ">=4.8.0"
