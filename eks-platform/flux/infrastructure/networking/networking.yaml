# ─── Envoy Gateway ─────────────────────────────────────────────────────────
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: envoy-gateway-system
  install:
    createNamespace: true
  chart:
    spec:
      chart: gateway-helm
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
      version: "v1.2.0"
---
