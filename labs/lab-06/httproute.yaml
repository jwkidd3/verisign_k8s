apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: lab06-$STUDENT_NAME
spec:
  parentRefs:
    - name: lab-gateway
      sectionName: http
  hostnames:
    - "app-$STUDENT_NAME.lab.local"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app-v1-svc
          port: 80
          weight: 80
        - name: app-v2-svc
          port: 80
          weight: 20
