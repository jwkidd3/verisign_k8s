apiVersion: apps/v1
kind: Deployment
metadata:
  name: zone-spread
  namespace: sched-$STUDENT_NAME
spec:
  replicas: 4
  selector:
    matchLabels:
      app: zone-spread
  template:
    metadata:
      labels:
        app: zone-spread
    spec:
      containers:
      - name: app
        image: nginx:1.25-alpine
        resources:
          requests: { cpu: 50m, memory: 32Mi }
          limits: { cpu: 100m, memory: 64Mi }
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: zone-spread
