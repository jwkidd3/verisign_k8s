apiVersion: apps/v1
kind: Deployment
metadata:
  name: graceful-app
  namespace: probes-lab-$STUDENT_NAME
spec:
  replicas: 2
  selector:
    matchLabels: { app: graceful-app }
  template:
    metadata:
      labels: { app: graceful-app }
    spec:
      terminationGracePeriodSeconds: 45
      containers:
      - name: server
        image: nginx:1.25
        ports: [{containerPort: 80}]
        lifecycle:
          preStop:
            exec:
              command: ['sh', '-c', 'sleep 10; nginx -s quit']
        livenessProbe:
          httpGet: { path: /, port: 80 }
        readinessProbe:
          httpGet: { path: /, port: 80 }
