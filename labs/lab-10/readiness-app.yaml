apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-app
  namespace: probes-lab-$STUDENT_NAME
spec:
  replicas: 3
  selector:
    matchLabels: { app: readiness-app }
  template:
    metadata:
      labels: { app: readiness-app }
    spec:
      containers:
      - name: server
        image: nginx:1.25
        ports: [{containerPort: 80}]
        readinessProbe:
          httpGet: { path: /ready, port: 80 }
          initialDelaySeconds: 3
          periodSeconds: 5
          failureThreshold: 2
          successThreshold: 2
        livenessProbe:
          httpGet: { path: /, port: 80 }
---
apiVersion: v1
kind: Service
metadata:
  name: readiness-svc
  namespace: probes-lab-$STUDENT_NAME
spec:
  selector: { app: readiness-app }
  ports:
  - port: 80
