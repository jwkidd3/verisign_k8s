apiVersion: apps/v1
kind: Deployment
metadata:
  name: slow-start-app
  namespace: probes-lab-$STUDENT_NAME
spec:
  replicas: 1
  selector:
    matchLabels: { app: slow-start-app }
  template:
    metadata:
      labels: { app: slow-start-app }
    spec:
      containers:
      - name: server
        image: nginx:1.25
        ports: [{containerPort: 80}]
        command: ['sh', '-c', 'sleep 30; nginx -g "daemon off;"']
        startupProbe:
          httpGet: { path: /, port: 80 }
          failureThreshold: 12
          periodSeconds: 5
        livenessProbe:
          httpGet: { path: /, port: 80 }
        readinessProbe:
          httpGet: { path: /, port: 80 }
