apiVersion: v1
kind: Pod
metadata:
  name: update-test
  namespace: lab05-$STUDENT_NAME
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "while true; do echo \"ENV: $APP_LOG_LEVEL | FILE: $(cat /etc/config/APP_LOG_LEVEL)\"; sleep 10; done"]
    envFrom:
      - configMapRef: { name: app-config }
    volumeMounts:
      - name: config-vol
        mountPath: /etc/config
        readOnly: true
  volumes:
    - name: config-vol
      configMap:
        name: app-config
  restartPolicy: Never
