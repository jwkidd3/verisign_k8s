apiVersion: apps/v1
kind: Deployment
metadata:
  name: inflate
  namespace: lab02-$STUDENT_NAME
spec:
  replicas: 5
  selector:
    matchLabels:
      app: inflate
  template:
    metadata:
      labels:
        app: inflate
    spec:
      containers:
      - name: inflate
        image: registry.k8s.io/pause:3.9
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
