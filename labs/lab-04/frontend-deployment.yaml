apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lab04-$STUDENT_NAME
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      tier: web
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
              name: http
            - containerPort: 8443
              name: https
