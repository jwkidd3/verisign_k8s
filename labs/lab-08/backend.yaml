apiVersion: v1
kind: Pod
metadata:
  name: backend
  namespace: lab08-$STUDENT_NAME
  labels: { app: bookstore, tier: backend }
spec:
  containers:
  - name: api
    image: nginx:1.25
    ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: lab08-$STUDENT_NAME
spec:
  selector: { tier: backend }
  ports: [{ port: 80, targetPort: 80 }]
