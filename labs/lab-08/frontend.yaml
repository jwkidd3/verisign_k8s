apiVersion: v1
kind: Pod
metadata:
  name: frontend
  namespace: lab08-$STUDENT_NAME
  labels: { app: bookstore, tier: frontend }
spec:
  containers:
  - name: web
    image: nginx:1.25
    ports: [{ containerPort: 80 }]
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: lab08-$STUDENT_NAME
spec:
  selector: { tier: frontend }
  ports: [{ port: 80, targetPort: 80 }]
